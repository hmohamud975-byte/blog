<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Blog Login</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:380px;
    background:#1c1c1c;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
}

h2{
    text-align:center;
    color:#00e5ff;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

.login-btn{
    width:100%;
    padding:12px;
    background:#00bcd4;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.login-btn:hover{
    background:#0097a7;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
    margin-top:10px;
}

.options a{
    color:#00e5ff;
    text-decoration:none;
}

hr{
    margin:30px 0;
    border:1px solid #333;
}

.vip{
    text-align:center;
}

.vip h3{
    color:gold;
}

.vip p{
    color:#ccc;
    font-size:14px;
}

.vip-btn{
    margin-top:15px;
    width:100%;
    padding:12px;
    background:gold;
    color:black;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.vip-btn:hover{
    background:#ffca28;
}
</style>

</head>
<body>

<div class="container">

<h2>🎮 Gamer Login</h2>

<form>

<label>Username</label>
<input type="text" placeholder="Enter your username" required>

<label>Password</label>
<input type="password" placeholder="Enter your password" required>

<div class="options">
<label>
<input type="checkbox">
Remember Me
</label>

<a href="#">Forgot Password?</a>
</div>

<button class="login-btn" type="submit">Log In</button>

</form>

<hr>

<div class="vip">

<h3>⭐ VIP Premium</h3>

<p>
Unlock exclusive gaming news, premium reviews, early access articles,
member-only giveaways, and an ad-free experience.
</p>

<button class="vip-btn">
Become a VIP Member
</button>

</div>

</div>

</body>
</html>
